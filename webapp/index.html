<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Kalpavriksha Technologies</title>

    <style>
      html,
      body,
      body > div,
      #content,
      #container,
      #container-uiarea {
        height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
    </style>
  <script id="sap-ui-bootstrap"
    src="https://ui5.sap.com/resources/sap-ui-core.js"
    data-sap-ui-theme="sap_horizon"
    data-sap-ui-libs="sap.m,sap.ui.core"
    data-sap-ui-async="true" data-sap-ui-resourceroots='{
            "sap.com.interview": "./"
        }' data-sap-ui-oninit="module:sap/ui/core/ComponentSupport" data-sap-ui-compatVersion="edge"
    data-sap-ui-async="true" data-sap-ui-frameOptions="trusted"></script>


</head>

<body class="sapUiBody sapUiSizeCompact" id="content">
  <div data-sap-ui-component data-name="sap.com.interview" data-id="container"
    data-settings='{"id" : "sap.com.interview"}' data-handle-validation="true"></div>
</body>

</html>
